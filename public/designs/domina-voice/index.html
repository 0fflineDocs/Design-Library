<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Domina Voice</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
:root{
  /* room */
  --bg-0:#0a0a0a;
  --bg-1:#121212;
  --panel:#0f0d0e;
  --panel-2:#141113;
  --border:#231e20;
  --border-bright:#3a2a2c;

  /* the bleed: wine -> blood -> call-to-action */
  --wine:#4a0000;
  --blood:#b91c1c;
  --cta:#dc2626;
  --ember:#ff5141;

  /* indicators */
  --green:#22c55e;
  --grey:#4a4540;
  --amber:#c9892f;

  /* text — warm bone, never cold white */
  --fg:#ece7e2;
  --fg-2:#9a918c;
  --fg-3:#5e5651;

  --font-display:"Instrument Serif",Georgia,serif;
  --font-sans:"Space Grotesk",-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",Menlo,monospace;

  --ease:cubic-bezier(.2,0,0,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:var(--bg-0);
  color:var(--fg);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
/* the black room with a single red light overhead */
#root{
  position:fixed;inset:0;
  background:
    radial-gradient(120% 75% at 72% -12%, #2a0708 0%, #14080a 26%, #0c0809 52%, var(--bg-0) 78%),
    radial-gradient(90% 60% at 12% 115%, #160606 0%, rgba(10,10,10,0) 60%),
    var(--bg-0);
}
/* faint vignette to deepen the corners */
#root::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 0 0 200px 40px rgba(0,0,0,.7);
}

.t-label{
  font-family:var(--font-mono);font-size:11px;line-height:1;
  letter-spacing:.18em;text-transform:uppercase;color:var(--fg-2);
}
.t-caption{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);}

/* ===================================================================
   LAYOUT
   =================================================================== */
.booth{
  position:relative;z-index:1;
  height:100%;width:100%;
  max-width:1380px;margin:0 auto;
  display:grid;
  grid-template-columns:1.18fr .82fr;
  gap:1px;                 /* hairline seam between panels */
  background:var(--border);/* the seam colour */
  padding:clamp(14px,2.4vw,30px);
  border:none;
}
.booth::before{
  /* the seam should only show between, not around — mask via panels */
  content:none;
}

.stage,.chat{
  background:linear-gradient(180deg,var(--panel) 0%, #0c0a0b 100%);
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  min-height:0;min-width:0;
  position:relative;
}
.stage{padding:clamp(20px,2.6vw,34px);}
.chat{padding:0;overflow:hidden;}

/* ===================================================================
   STAGE HEAD — brand + status
   =================================================================== */
.stage-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:16px;
}
.brand{display:flex;align-items:baseline;gap:12px;}
.brand-mark{
  font-family:var(--font-display);font-size:30px;line-height:1;
  color:var(--fg);
  width:42px;height:42px;display:grid;place-items:center;
  border:1px solid var(--border-bright);
  background:linear-gradient(160deg,#1a0809,#0c0708);
  box-shadow:inset 0 0 18px rgba(220,38,38,.16);
  position:relative;top:-2px;
}
.brand{display:flex;align-items:center;gap:14px;}
.brand-lock{display:flex;flex-direction:column;gap:5px;}
.wordmark{
  margin:0;font-family:var(--font-display);font-weight:400;
  font-size:clamp(28px,3.2vw,42px);line-height:.9;letter-spacing:-.01em;
  color:var(--fg);
}
.wordmark-sub{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.34em;
  text-transform:uppercase;color:var(--cta);
}

/* status — the whole row slides on change */
.status{
  display:flex;align-items:center;gap:9px;
  padding:8px 13px;border:1px solid var(--border);
  background:rgba(0,0,0,.25);
  transition:border-color .4s var(--ease), background .4s var(--ease);
}
.status-dot{
  width:7px;height:7px;border-radius:50%;background:var(--grey);
  transition:all .4s var(--ease);
  flex:none;
}
.status-label{
  color:var(--fg-2);transition:color .4s var(--ease);
  animation:statusSlide .45s var(--ease-out);
}
@keyframes statusSlide{
  from{opacity:0;transform:translateX(8px);}
  to{opacity:1;transform:translateX(0);}
}
.status-grey  .status-dot{background:var(--grey);}
.status-red   .status-dot{background:var(--cta);box-shadow:0 0 10px 1px rgba(220,38,38,.7);}
.status-red   .status-label{color:#e3a39c;}
.status-red   {border-color:var(--border-bright);}
.status-green .status-dot{background:var(--green);box-shadow:0 0 10px 1px rgba(34,197,94,.7);animation:pulseDot 1.1s ease-in-out infinite;}
.status-green .status-label{color:#9ad9af;}
.status-green {border-color:#1c3a26;}
.status-amber .status-dot{background:var(--amber);box-shadow:0 0 9px 1px rgba(201,137,47,.6);animation:pulseDot 1s ease-in-out infinite;}
.status-amber .status-label{color:#d8b27f;}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ===================================================================
   VISUALIZER
   =================================================================== */
.viz-stage{
  flex:1 1 auto;min-height:0;
  display:flex;align-items:center;justify-content:center;
  margin:clamp(16px,2.4vh,30px) 0;
  position:relative;
}
.viz-wrap{
  width:100%;
  height:clamp(160px,30vh,260px);
  position:relative;
  overflow:hidden;
}
.viz-canvas{display:block;width:100%;height:100%;}

/* ---- loading ring: self-drawing stroke ---- */
.loader{display:flex;flex-direction:column;align-items:center;gap:22px;}
.loader-ring{transform:rotate(-90deg);}
.loader-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:2;}
.loader-arc{
  fill:none;stroke:var(--cta);stroke-width:2;stroke-linecap:round;
  stroke-dasharray:339.292;          /* 2πr, r=54 */
  stroke-dashoffset:339.292;
  filter:drop-shadow(0 0 6px rgba(220,38,38,.7));
  animation:drawRing 2.4s var(--ease) infinite;
}
@keyframes drawRing{
  0%{stroke-dashoffset:339.292;opacity:.4;}
  55%{stroke-dashoffset:42;opacity:1;}
  100%{stroke-dashoffset:339.292;opacity:.4;transform:rotate(360deg);}
}
.loader-arc{transform-origin:60px 60px;}
.loader-label{
  color:var(--fg-2);animation:softPulse 1.8s ease-in-out infinite;
}
@keyframes softPulse{0%,100%{opacity:.35;}50%{opacity:.9;}}

/* ===================================================================
   STAGE CONTROLS — mic + mode toggle
   =================================================================== */
.stage-controls{
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;flex-wrap:wrap;
}
.mic-cluster{display:flex;align-items:center;gap:16px;}
.mic-btn{
  --ring:var(--grey);
  position:relative;
  width:64px;height:64px;flex:none;
  border-radius:50%;
  border:1px solid var(--border-bright);
  background:radial-gradient(120% 120% at 50% 25%, #1b1517 0%, #0c0a0b 75%);
  color:var(--fg-2);
  display:grid;place-items:center;
  cursor:pointer;overflow:visible;
  transition:transform .25s var(--ease), border-color .3s var(--ease),
             color .3s var(--ease), box-shadow .35s var(--ease);
}
.mic-btn:hover:not(:disabled){transform:translateY(-1px);}
.mic-btn:active:not(:disabled){transform:translateY(1px) scale(.97);}
.mic-btn:disabled{opacity:.4;cursor:not-allowed;}
.mic-glyph{position:relative;z-index:2;transition:color .3s var(--ease);}

.mic-pulse{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid var(--ring);opacity:0;pointer-events:none;
}
/* idle */
.mic-idle{--ring:var(--grey);}
/* listening — green studio glow + breathing rings */
.mic-listening{
  --ring:var(--green);
  border-color:#1f6b39;color:#bff0cf;
  box-shadow:0 0 0 1px rgba(34,197,94,.35),0 0 26px 2px rgba(34,197,94,.30);
}
.mic-listening .mic-glyph{color:#7ee6a4;}
.mic-listening .mic-pulse{animation:micRing 1.8s ease-out infinite;}
.mic-listening .mic-pulse-2{animation-delay:.9s;}
/* speaking — red glow */
.mic-speaking{
  --ring:var(--cta);
  border-color:#7a1d20;color:#f1b5b0;
  box-shadow:0 0 0 1px rgba(220,38,38,.4),0 0 30px 3px rgba(220,38,38,.34);
}
.mic-speaking .mic-glyph{color:#f3a39c;}
.mic-speaking .mic-pulse{animation:micRing 1.5s ease-out infinite;border-color:var(--cta);}
/* thinking/holding — dim red steady */
.mic-thinking{--ring:var(--cta);border-color:#5a2024;color:#c98a86;}
@keyframes micRing{
  0%{opacity:.5;transform:scale(1);}
  100%{opacity:0;transform:scale(1.55);}
}
.mic-ripple{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.18),transparent 60%);
  animation:micTap .6s var(--ease-out) forwards;pointer-events:none;
}
@keyframes micTap{from{opacity:.7;transform:scale(.6);}to{opacity:0;transform:scale(1.8);}}

.mic-state-label{color:var(--fg-2);transition:color .3s var(--ease);}

/* mode toggle — sliding thumb */
.mode-toggle{
  position:relative;display:flex;padding:4px;
  border:1px solid var(--border);background:rgba(0,0,0,.3);
}
.mode-thumb{
  position:absolute;top:4px;bottom:4px;left:4px;width:calc(50% - 4px);
  background:linear-gradient(180deg,#2a0a0c,#1a0708);
  border:1px solid var(--border-bright);
  box-shadow:inset 0 0 16px rgba(220,38,38,.22);
  transition:transform .34s var(--ease);
}
.mode-thumb[data-mode="chat"]{transform:translateX(100%);}
.mode-opt{
  position:relative;z-index:1;
  flex:1;min-width:76px;
  background:none;border:none;cursor:pointer;
  font-family:var(--font-mono);font-size:12px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--fg-2);
  padding:9px 14px;transition:color .3s var(--ease);
}
.mode-opt.is-on{color:var(--fg);}

/* ===================================================================
   CHAT
   =================================================================== */
.chat-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--border);
  flex:none;
}
.chat-head-meta{color:var(--fg-3);}

.thread{
  flex:1 1 auto;min-height:0;overflow-y:auto;
  padding:22px;
  display:flex;flex-direction:column;gap:18px;
  scroll-behavior:smooth;
}
.thread::-webkit-scrollbar{width:8px;}
.thread::-webkit-scrollbar-thumb{background:#241d1f;border:2px solid transparent;background-clip:padding-box;}
.thread-empty{margin:auto;color:var(--fg-3);}

.msg{display:flex;flex-direction:column;gap:7px;max-width:84%;}
.msg-agent{align-self:flex-start;align-items:flex-start;animation:slideInL .5s var(--ease-out);}
.msg-user{align-self:flex-end;align-items:flex-end;animation:slideInR .5s var(--ease-out);}
@keyframes slideInL{from{opacity:0;transform:translateX(-26px) scale(.96);}to{opacity:1;transform:translateX(0) scale(1);}}
@keyframes slideInR{from{opacity:0;transform:translateX(26px) scale(.96);}to{opacity:1;transform:translateX(0) scale(1);}}
.msg-meta{color:var(--fg-3);padding:0 2px;}

.bubble{
  padding:13px 16px;border:1px solid var(--border);
  font-size:15px;line-height:1.5;
  transition:border-color .3s var(--ease),box-shadow .3s var(--ease);
  text-wrap:pretty;
}
.bubble-user{
  background:linear-gradient(180deg,#1c0a0c,#140708);
  border-color:#3a1417;color:#f0ddda;border-radius:3px 3px 0 3px;
}
.bubble-agent{
  background:var(--panel-2);color:var(--fg);
  border-radius:3px 3px 3px 0;
  font-family:var(--font-display);font-size:19px;line-height:1.35;
}
.bubble-thinking{
  border-color:#5a2024;
  box-shadow:0 0 0 1px rgba(220,38,38,.2),0 0 22px rgba(220,38,38,.16);
  animation:thinkGlow 1.5s ease-in-out infinite;
}
@keyframes thinkGlow{
  0%,100%{box-shadow:0 0 0 1px rgba(220,38,38,.16),0 0 14px rgba(220,38,38,.10);}
  50%{box-shadow:0 0 0 1px rgba(220,38,38,.45),0 0 30px rgba(220,38,38,.32);}
}
.typing-dots{display:inline-flex;gap:5px;align-items:center;height:22px;}
.typing-dots i{
  width:6px;height:6px;border-radius:50%;background:var(--cta);
  animation:typing 1.1s ease-in-out infinite;
}
.typing-dots i:nth-child(2){animation-delay:.18s;}
.typing-dots i:nth-child(3){animation-delay:.36s;}
@keyframes typing{0%,100%{opacity:.25;transform:translateY(0);}50%{opacity:1;transform:translateY(-3px);}}

/* composer */
.composer{
  flex:none;display:flex;align-items:center;gap:10px;
  padding:16px 18px;border-top:1px solid var(--border);
  background:rgba(0,0,0,.25);
  position:relative;
  transition:box-shadow .35s var(--ease),border-color .35s var(--ease);
}
.composer::before{
  content:"";position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cta),transparent);
  opacity:0;transition:opacity .35s var(--ease);
}
.composer.is-focus{box-shadow:inset 0 0 0 1px rgba(220,38,38,.5),0 -2px 30px rgba(220,38,38,.12);}
.composer.is-focus::before{opacity:.9;}
.composer.is-locked{opacity:.5;}
.composer-input{
  flex:1;min-width:0;background:none;border:none;outline:none;
  font-family:var(--font-sans);font-size:15px;color:var(--fg);
  padding:8px 2px;
}
.composer-input::placeholder{color:var(--fg-3);}

.send-btn{
  position:relative;overflow:hidden;flex:none;
  width:44px;height:44px;display:grid;place-items:center;
  border:1px solid var(--border-bright);
  background:linear-gradient(180deg,#2a0a0c,#160708);
  color:#f0b5b0;cursor:pointer;border-radius:2px;
  transition:transform .2s var(--ease),box-shadow .3s var(--ease),
             border-color .3s var(--ease),color .3s var(--ease);
}
.send-btn:not(:disabled):hover{
  transform:scale(1.06);color:#fff;border-color:var(--cta);
  background:linear-gradient(180deg,#4a0f12,#dc2626);
  box-shadow:0 0 22px rgba(220,38,38,.4);
}
.send-btn:not(:disabled):active{transform:scale(.94);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.send-ripple{
  position:absolute;inset:0;margin:auto;width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.55);animation:sendRip .6s var(--ease-out) forwards;
}
@keyframes sendRip{from{opacity:.6;transform:scale(1);}to{opacity:0;transform:scale(14);}}

/* ===================================================================
   RESPONSIVE — stack to a single column on mobile
   =================================================================== */
@media (max-width:820px){
  body{overflow:auto;}
  #root{position:absolute;min-height:100%;}
  .booth{
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
    height:auto;min-height:100%;
    gap:1px;
  }
  .stage{padding:22px 18px;}
  .viz-stage{margin:18px 0;}
  .viz-wrap{height:170px;}
  .chat{min-height:60vh;}
  .stage-controls{justify-content:space-between;}
}
@media (max-width:430px){
  .stage-head{flex-direction:column;gap:14px;}
  .stage-controls{flex-direction:column;align-items:stretch;gap:18px;}
  .mic-cluster{justify-content:center;}
  .mode-toggle{justify-content:center;}
  .msg{max-width:92%;}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
