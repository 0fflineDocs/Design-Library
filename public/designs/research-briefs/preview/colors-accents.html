<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); font-family: var(--sans-body); }
  .wrap { display: flex; gap: 1px; padding: 20px; background: var(--gold-tint-soft); }
  .sw { flex: 1; height: 150px; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; }
  .role { font-family: var(--mono-meta); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: auto; opacity: 0.85; }
  .name { font-family: var(--sans-body); font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--mono-meta); font-size: 11px; margin-top: 4px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background: var(--gold); color: #0A0A0A;">
      <div class="role">Rules · glyphs · active</div>
      <div class="name">Antique Gold</div><div class="hex">#D4AF37</div>
    </div>
    <div class="sw" style="background: var(--copper); color: #0A0A0A;">
      <div class="role">Byline marker</div>
      <div class="name">Copper Ember</div><div class="hex">#B67333</div>
    </div>
    <div class="sw" style="background: var(--moss); color: var(--gold);">
      <div class="role">Pull-quote · Neuro tag</div>
      <div class="name" style="color: var(--fg);">Deep Moss</div><div class="hex" style="color: var(--fg-muted);">#172B22</div>
    </div>
  </div>
</body>
</html>
