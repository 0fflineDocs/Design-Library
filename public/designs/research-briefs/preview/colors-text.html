<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); font-family: var(--sans-body); }
  .wrap { display: flex; gap: 1px; padding: 20px; background: var(--gold-tint-soft); }
  .sw { flex: 1; height: 150px; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; background: var(--surface); }
  .chip { width: 36px; height: 36px; border-radius: 2px; margin-bottom: auto; }
  .name { font-family: var(--sans-body); font-weight: 600; font-size: 13px; }
  .hex { font-family: var(--mono-meta); font-size: 11px; color: var(--fg-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw">
      <div class="chip" style="background: var(--fg);"></div>
      <div class="name" style="color: var(--fg);">Foreground</div>
      <div class="hex">#E5DFD0 · body text</div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--fg-muted);"></div>
      <div class="name" style="color: var(--fg-muted);">Muted Foreground</div>
      <div class="hex">#8A8578 · dates, meta</div>
    </div>
  </div>
</body>
</html>
