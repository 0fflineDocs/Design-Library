<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); font-family: var(--sans-body); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 20px; }
  .sw { height: 56px; border-radius: 3px; display: flex; align-items: center; padding: 0 14px; background: var(--surface); }
  .demo { width: 40px; height: 28px; border-radius: 2px; margin-right: 14px; }
  .txt { font-family: var(--sans-body); font-size: 12px; color: var(--fg); }
  .val { font-family: var(--mono-meta); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw">
      <div class="demo" style="background: var(--gold-tint); border: 1px solid var(--gold-tint-line);"></div>
      <div><div class="txt">Subtle Gold Tint</div><div class="val">rgba(212,175,55,0.10)</div></div>
    </div>
    <div class="sw">
      <div class="demo" style="border: 1px solid var(--gold-tint-soft);"></div>
      <div><div class="txt">Card Border</div><div class="val">rgba(...,0.08)</div></div>
    </div>
    <div class="sw">
      <div class="demo" style="background: var(--moss-wash);"></div>
      <div><div class="txt">Moss Wash · featured</div><div class="val">rgba(22,43,34,0.6)</div></div>
    </div>
    <div class="sw">
      <div class="demo" style="border: 1px solid var(--danger-tint);"></div>
      <div><div class="txt">Security Tint</div><div class="val">rgba(192,64,64,0.3)</div></div>
    </div>
  </div>
</body>
</html>
