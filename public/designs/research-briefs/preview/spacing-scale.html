<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 22px 28px; font-family: var(--sans-body); }
  .lab { font-family: var(--mono-meta); font-size: 10px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }
  .bar { height: 18px; background: var(--gold); opacity: 0.5; border-radius: 1px; }
  .name { font-family: var(--mono-meta); font-size: 11px; color: var(--fg-muted); width: 110px; flex: none; }
</style>
</head>
<body>
  <div class="lab">Spacing scale · rem</div>
  <div class="row"><span class="name">0.25 · 0.5 · 0.75</span><span class="bar" style="width:4px;"></span><span class="bar" style="width:8px;"></span><span class="bar" style="width:12px;"></span></div>
  <div class="row"><span class="name">1 · 1.5 · 2</span><span class="bar" style="width:16px;"></span><span class="bar" style="width:24px;"></span><span class="bar" style="width:32px;"></span></div>
  <div class="row"><span class="name">3 · 4</span><span class="bar" style="width:48px;"></span><span class="bar" style="width:64px;"></span></div>
  <div class="row"><span class="name">6 · 8</span><span class="bar" style="width:96px;"></span><span class="bar" style="width:128px;"></span></div>
</body>
</html>
