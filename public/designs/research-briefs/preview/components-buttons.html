<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 24px 28px; }
  .lab { font-family: var(--mono-meta); font-size: 10px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .btn { background: transparent; border: 1px solid var(--gold-tint-line); border-radius: 2px; color: var(--fg); font-family: var(--mono-meta); font-size: 12px; padding: 11px 16px; }
  .btn.hover { background: var(--surface-elevated); border-color: var(--gold); }
  .btn.disabled { opacity: 0.35; }
  .page { font-family: var(--mono-meta); font-size: 12px; color: var(--fg-muted); }
  .note { font-family: var(--mono-meta); font-size: 10px; color: var(--fg-muted); margin-top: 18px; }
</style>
</head>
<body>
  <div class="lab">Buttons · pagination</div>
  <div class="row">
    <button class="btn disabled">← Older</button>
    <span class="page">Page 1 of 1</span>
    <button class="btn hover">Newer →</button>
  </div>
  <div class="note">ghost button · hover (gold border + elevated) · disabled (35% opacity)</div>
</body>
</html>
