<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 22px 28px; }
  .lab { font-family: var(--mono-meta); font-size: 10px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .scale > div { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .px { font-family: var(--mono-meta); font-size: 10px; color: var(--fg-muted); width: 48px; flex: none; }
  .spec { color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s1 { font-family: var(--serif-display); font-weight: 700; font-size: 40px; line-height: 1; letter-spacing: -0.02em; }
  .s2 { font-family: var(--serif-display); font-weight: 600; font-size: 28px; line-height: 1; }
  .s3 { font-family: var(--serif-display); font-weight: 500; font-size: 22px; }
  .s4 { font-family: var(--serif-display); font-weight: 500; font-size: 17px; }
  .s5 { font-family: var(--sans-body); font-weight: 400; font-size: 15px; color: var(--fg-muted); }
  .s6 { font-family: var(--mono-meta); font-size: 12px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="lab">Type scale · ≥1.25× per step</div>
  <div class="scale">
    <div><span class="px">64</span><span class="spec s1">Display</span></div>
    <div><span class="px">32</span><span class="spec s2">Section</span></div>
    <div><span class="px">24</span><span class="spec s3">Featured title</span></div>
    <div><span class="px">18</span><span class="spec s4">Card title</span></div>
    <div><span class="px">15</span><span class="spec s5">Body / excerpt</span></div>
    <div><span class="px">12</span><span class="spec s6">METADATA</span></div>
  </div>
</body>
</html>
