<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}label{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-secondary)}input,select,textarea{font-family:var(--font-sans);font-size:15px;background:var(--surface);border:1px solid var(--border);color:var(--fg);padding:10px 12px;border-radius:2px;width:100%;outline:none;transition:border-color 180ms}input:focus{border-color:#C7F23C;outline:2px solid #C7F23C;outline-offset:0}input::placeholder{color:var(--fg-tertiary)}.row{display:grid;grid-template-columns:1fr 1fr;gap:18px}.check{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--fg-secondary)}.box{width:14px;height:14px;border:1px solid var(--border-emphasis);background:#C7F23C;display:inline-block}</style></head><body>

</body></html>
