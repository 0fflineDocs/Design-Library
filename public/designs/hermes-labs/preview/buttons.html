<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}button{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:12px 20px;border:1px solid var(--border-emphasis);background:transparent;color:var(--fg);cursor:pointer;border-radius:0;letter-spacing:-0.005em;transition:all 180ms cubic-bezier(.2,0,0,1)}.primary{background:#C7F23C;border-color:#C7F23C;color:#0E0D0B;font-weight:700}.primary:hover{background:#9DC02E;border-color:#9DC02E}.ghost:hover{border-color:#5C574F;background:#1F1C16}.danger{border-color:#D9603B;color:#D9603B}.danger:hover{background:#D9603B;color:#0E0D0B}.icon{display:flex;align-items:center;gap:8px}.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);letter-spacing:0.06em;margin-top:6px}</style></head><body>
<div class="t-label" style="margin-bottom:14px">BUTTONS · SHARP, CONFIDENT, NO RADIUS</div>
<div class="row">
  <button class="primary">Open archive</button>
  <button class="ghost">View timeline</button>
  <button class="ghost icon"><span style="display:inline-block;width:6px;height:6px;background:#C7F23C"></span>Filter</button>
  <button class="danger">Discard</button>
  <button class="ghost" disabled style="opacity:.4;cursor:not-allowed">Disabled</button>
</div>
<div class="cap" style="margin-top:14px">PRIMARY · GHOST · GHOST W/ MARKER · DESTRUCTIVE · DISABLED</div>
</body></html>
