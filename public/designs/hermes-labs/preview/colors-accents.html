<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.card{border:1px solid var(--border);background:var(--surface);padding:18px}.swatch{height:64px;margin-bottom:12px;display:flex;align-items:flex-end;padding:10px}.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-secondary)}.val{font-family:var(--font-mono);font-size:13px;color:var(--fg);margin-top:2px}.note{font-size:12px;color:var(--fg-secondary);margin-top:8px;line-height:1.4}</style></head><body>
<div class="t-label" style="margin-bottom:10px">ACCENTS · USED SPARINGLY</div>
<div class="row">
  <div class="card">
    <div class="swatch" style="background:#C7F23C"><span class="lbl" style="color:#0E0D0B">primary</span></div>
    <div class="val">#C7F23C · acid green</div>
    <div class="note">Signature. Active state, milestone markers, data-viz lead series. ~3–5% of any composition.</div>
  </div>
  <div class="card">
    <div class="swatch" style="background:#D9603B"><span class="lbl" style="color:#0E0D0B">secondary</span></div>
    <div class="val">#D9603B · rust</div>
    <div class="note">Investments accent, callout flags, second data series. ~1–2% of a composition.</div>
  </div>
</div>
</body></html>
