<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.badge{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border:1px solid var(--border);background:var(--surface);color:var(--fg-secondary)}.badge.accent{border-color:#C7F23C;color:#C7F23C}.badge.rust{border-color:#D9603B;color:#D9603B}.badge.solid{background:#C7F23C;color:#0E0D0B;border-color:#C7F23C;font-weight:500}.badge.dot::before{content:"";display:inline-block;width:6px;height:6px;background:#C7F23C;margin-right:8px;vertical-align:middle}</style></head><body>
<div class="t-label" style="margin-bottom:10px">BADGES · LABELS · STATUS</div>
<div class="row">
  <span class="badge">Section</span>
  <span class="badge accent">Active</span>
  <span class="badge rust">Investment</span>
  <span class="badge solid">Frontier</span>
  <span class="badge dot">Live</span>
</div>
<div class="row">
  <span class="badge">1956 — 1974</span>
  <span class="badge">Symbolic</span>
  <span class="badge">Connectionism</span>
  <span class="badge accent">Transformers</span>
</div>
</body></html>
