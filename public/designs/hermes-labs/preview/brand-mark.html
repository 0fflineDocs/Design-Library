<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:24px;display:flex;gap:32px;align-items:center}.mark{width:120px;height:120px;background:var(--bg);border:1px solid var(--border);position:relative;display:flex;align-items:flex-end;justify-content:center}.mark span{font-family:var(--font-display);font-size:140px;line-height:1;color:var(--fg);transform:translateY(8px)}.dot{position:absolute;left:14px;bottom:14px;width:6px;height:6px;background:#C7F23C}.note{font-family:var(--font-mono);font-size:12px;color:var(--fg-secondary);line-height:1.5;letter-spacing:0.04em;max-width:320px}</style></head><body>
<div class="mark"><span>E</span><div class="dot"></div></div>
<div>
  <div class="t-label" style="margin-bottom:8px">MARK · "E" + ACID DOT</div>
  <div class="note">Used at favicon, social avatar, badge sizes. Acid square sits at 14px inset, signals the brand without the wordmark.</div>
</div>
</body></html>
