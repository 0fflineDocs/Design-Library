<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:flex;gap:24px;flex-wrap:wrap}.b{background:var(--surface);width:140px;height:90px;display:flex;align-items:center;justify-content:center;color:var(--fg-secondary);font-family:var(--font-mono);font-size:12px}.cap{font-family:var(--font-mono);font-size:11px;color:var(--fg-tertiary);margin-top:8px;letter-spacing:0.06em}</style></head><body>
<div class="t-label" style="margin-bottom:14px">BORDERS &amp; RADII · ARCHITECTURAL, NOT SOFT</div>
<div class="row">
  <div><div class="b" style="border:1px solid #2A2620;border-radius:0">radius-0</div><div class="cap">DEFAULT · 0PX</div></div>
  <div><div class="b" style="border:1px solid #2A2620;border-radius:2px">radius-sm</div><div class="cap">INPUTS · 2PX MAX</div></div>
  <div><div class="b" style="border:1px solid #3D372E;border-radius:0">emphasis</div><div class="cap">HOVER · BORDER UP</div></div>
  <div><div class="b" style="border:1px solid #C7F23C;border-radius:0">accent</div><div class="cap">FOCUS · 2PX OUTLINE</div></div>
</div>
<div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-secondary);margin-top:14px;letter-spacing:0.04em">No drop-shadows · no glassmorphism · elevation = border + tint</div>
</body></html>
