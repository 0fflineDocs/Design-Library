<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border)}.sw{padding:14px 14px 18px;border-right:1px solid var(--border);height:120px;display:flex;flex-direction:column;justify-content:flex-end}.sw:last-child{border-right:none}.h{height:8px;width:24px;margin-bottom:auto}.lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-secondary)}.val{font-family:var(--font-mono);font-size:13px;color:var(--fg);margin-top:4px}</style></head><body>

</div>
</body></html>
