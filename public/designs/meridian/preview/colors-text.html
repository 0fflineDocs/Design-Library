<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{padding:20px}.row{display:flex;flex-direction:column;gap:0;border:1px solid var(--border)}.line{display:flex;align-items:center;gap:18px;padding:14px 18px;border-bottom:1px solid var(--border)}.line:last-child{border-bottom:none}.dot{width:18px;height:18px;border:1px solid var(--border-emphasis)}.role{font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;width:120px;color:var(--fg-secondary)}.hex{font-family:var(--font-mono);font-size:13px;width:100px}.demo{flex:1}</style></head><body>
<div class="t-label" style="margin-bottom:10px">TEXT · WARM BONE PALETTE</div>
<div class="row">
  <div class="line"><div class="dot" style="background:#E8E2D5"></div><div class="role">primary</div><div class="hex">#E8E2D5</div><div class="demo" style="color:#E8E2D5;font-size:18px">A history of artificial intelligence</div></div>
  <div class="line"><div class="dot" style="background:#9A9285"></div><div class="role">secondary</div><div class="hex">#9A9285</div><div class="demo" style="color:#9A9285;font-size:16px">Body copy and metadata in second tier</div></div>
  <div class="line"><div class="dot" style="background:#605A4F"></div><div class="role">tertiary</div><div class="hex">#605A4F</div><div class="demo" style="color:#605A4F;font-size:14px">Timestamps · captions · decorative</div></div>
  <div class="line"><div class="dot" style="background:#0E0D0B;border-color:#C7F23C"></div><div class="role">inverse</div><div class="hex">#0E0D0B</div><div class="demo" style="background:#C7F23C;color:#0E0D0B;display:inline-block;padding:6px 10px;font-size:13px;font-weight:500">on accent only</div></div>
</div>
</body></html>
