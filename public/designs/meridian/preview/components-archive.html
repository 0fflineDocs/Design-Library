<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 22px 28px; }
  .head { display: flex; align-items: center; gap: 14px; border-top: 1px solid var(--gold-tint-line); padding-top: 14px; margin-bottom: 8px; }
  .label { font-family: var(--mono-meta); font-weight: 500; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); }
  .line { flex: 1; height: 1px; background: var(--gold-tint-soft); }
  .row { display: flex; align-items: center; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--gold-tint-soft); }
  .bullet { color: var(--fg-muted); font-size: 9px; }
  .title { font-family: var(--sans-body); font-size: 15px; color: var(--fg); flex: 1; }
  .date { font-family: var(--mono-meta); font-size: 11px; color: var(--fg-muted); }
  .pill { font-family: var(--mono-meta); font-size: 10px; color: var(--fg-muted); border: 1px solid var(--gold-tint-soft); border-radius: 2px; padding: 2px 7px; }
</style>
</head>
<body>
  <div class="head"><span class="label">Archive</span><span class="line"></span></div>
  <div class="row"><span class="bullet">◆</span><span class="title">SSRI &amp; Libido — Extended Deep Dive</span><span class="date">May 26, 2026</span><span class="pill">20 min</span></div>
  <div class="row"><span class="bullet">◆</span><span class="title">Cognitive Atrophy — Full Research Synthesis</span><span class="date">May 15, 2026</span><span class="pill">18 min</span></div>
</body>
</html>
