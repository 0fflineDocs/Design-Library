<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 24px 28px; }
  .lab { font-family: var(--mono-meta); font-size: 10px; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .pills { display: flex; gap: 12px; flex-wrap: wrap; }
  .pill { font-family: var(--sans-body); font-weight: 500; font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--fg); background: transparent; border: 1px solid var(--gold-tint-line); border-radius: 2px; padding: 9px 14px; display: inline-flex; align-items: center; gap: 7px; }
  .pill.hover { background: var(--surface-elevated); }
  .pill.active { border-color: var(--gold); color: var(--gold); }
  .d { color: var(--gold); font-size: 8px; }
  .note { font-family: var(--mono-meta); font-size: 10px; color: var(--fg-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="lab">Category filter pills · states</div>
  <div class="pills">
    <span class="pill active"><span class="d">◆</span>All</span>
    <span class="pill">Neuro</span>
    <span class="pill hover">AI</span>
    <span class="pill">Security</span>
  </div>
  <div class="note">default · hover (elevated) · active (gold border + leading diamond)</div>
</body>
</html>
