<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--obsidian); padding: 0; }
  .wrap { display: flex; align-items: center; gap: 40px; padding: 28px 32px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .mark { width: 52px; height: 52px; }
  .name { font-family: var(--sans-body); font-weight: 600; font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--fg); }
  .name span { display: block; font-family: var(--mono-meta); font-size: 10px; font-weight: 400; letter-spacing: 0.04em; text-transform: none; color: var(--fg-muted); margin-top: 4px; }
  .glyphs { display: flex; gap: 18px; align-items: center; margin-left: auto; }
  .g { color: var(--gold); }
  .g.dim { color: var(--fg-muted); }
  .cap { font-family: var(--mono-meta); font-size: 9px; color: var(--fg-muted); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <img class="mark" src="../assets/hermes-mark.svg" alt="Hermes Labs mark" />
      <div class="name">Hermes Labs<span>Research Briefs</span></div>
    </div>
    <div class="glyphs">
      <div><div class="g" style="font-size:22px;">◆</div><div class="cap">active</div></div>
      <div><div class="g dim" style="font-size:22px;">◇</div><div class="cap">bullet</div></div>
      <div><div class="g" style="font-size:22px;">·</div><div class="cap">separator</div></div>
    </div>
  </div>
</body>
</html>
