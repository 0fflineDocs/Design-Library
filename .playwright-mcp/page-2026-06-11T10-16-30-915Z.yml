                - text: Rationalism, Empiricism & the Enlightenment
              - generic [ref=f9e383]:
                - article [ref=f9e384]:
                  - heading "Continental Rationalism" [level=4] [ref=f9e385]
                  - generic [ref=f9e386]: 17th c.
                  - paragraph [ref=f9e387]: Descartes, Spinoza, and Leibniz held that reason, working from clear and distinct ideas innate to the mind, can attain substantive truth about reality without dependence upon the senses. The geometric method of demonstration furnished the model.
                  - generic [ref=f9e388]: Figures Descartes · Spinoza · Leibniz · Malebranche
                - article [ref=f9e389]:
                  - heading "British Empiricism" [level=4] [ref=f9e390]
                  - generic [ref=f9e391]: 17th — 18th c.
                  - paragraph [ref=f9e392]:
                    - text: Locke, Berkeley, and Hume held that the mind is at birth a
                    - emphasis [ref=f9e393]: tabula rasa
                    - text: ", and that all the materials of thought are furnished by experience. Hume's critique of causation pressed the principle to its skeptical conclusion."
                  - generic [ref=f9e394]: Figures Locke · Berkeley · Hume · Reid
                - article [ref=f9e395]:
                  - heading "Political Contractarianism" [level=4] [ref=f9e396]
                  - generic [ref=f9e397]: 17th — 18th c.
                  - paragraph [ref=f9e398]: Hobbes, Locke, and Rousseau derived legitimate political authority from the consent of the governed — a hypothetical contract among individuals in a pre-political “state of nature” whose terms each gave very differently.
                  - generic [ref=f9e399]: Figures Hobbes · Locke · Rousseau · Montesquieu
                - article [ref=f9e400]:
                  - heading "Scottish Enlightenment" [level=4] [ref=f9e401]
                  - generic [ref=f9e402]: 18th c.
                  - paragraph [ref=f9e403]: Edinburgh and Glasgow produced, in a single generation, a science of human nature, a moral philosophy of sympathy, and the first systematic account of commercial society as a moral order.
                  - generic [ref=f9e404]: Figures Hume · Adam Smith · Thomas Reid · Adam Ferguson
