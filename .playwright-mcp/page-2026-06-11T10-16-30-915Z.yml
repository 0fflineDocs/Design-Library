                  - generic [ref=f9e206]: λόγος
                  - paragraph [ref=f9e207]: Reasoned account, ratio, the rational principle ordering the cosmos. Heraclitean in origin, central to Stoicism and later Christian theology.
                - generic [ref=f9e208]:
                  - generic [ref=f9e209]: Aporia
                  - generic [ref=f9e210]: ἀπορία · puzzlement
                  - paragraph [ref=f9e211]: The state of impasse the Socratic interlocutor arrives at when his confident definitions have been dismantled — the necessary opening of inquiry.
                - generic [ref=f9e212]:
                  - generic [ref=f9e213]: Phronēsis
                  - generic [ref=f9e214]: φρόνησις
                  - paragraph [ref=f9e215]: Practical wisdom — the deliberative virtue by which one perceives what right action consists in for the particular case at hand.
