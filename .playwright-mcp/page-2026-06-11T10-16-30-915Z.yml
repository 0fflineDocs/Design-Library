                  - text: Early Modern Philosophy
                - generic [ref=f9e334]: 1600 — 1800
              - paragraph [ref=f9e335]:
                - generic [ref=f9e336]: Argument of the Book
                - text: With Descartes the medieval scaffolding falls away. Philosophy now begins not with the world or with God but with the thinking subject; the problem of the era becomes the problem of knowledge — what the mind can be certain of, and on what basis. The Continental rationalists place reason at the foundation, the British empiricists experience; Kant, at the close, proposes a critical synthesis that organises the question for a century to come.
