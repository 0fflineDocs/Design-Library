                - paragraph [ref=f8e872]: "From the union of Echidna and Typhon — and from such other marriages as the world's margins permitted — came a brood of creatures unlike either gods or men. The heroes of the great age made their names by setting these creatures down: Heracles, Theseus, Bellerophon, Perseus. The bestiary that follows collects the most familiar, with a note on their lineage and on the fate that, in the end, found them."
