                  - generic [ref=f9e253]:
                    - paragraph [ref=f9e254]: Born in the kingdom of Sicily to a family of minor nobility, Aquinas entered the Dominican order against his family's wishes — they imprisoned him for a year in an effort to dissuade him — and studied under Albertus Magnus at Cologne. His vocation was the integration of the newly recovered corpus of Aristotle, transmitted to Latin Christendom through Arabic commentary, with the doctrine of the Church.
                    - paragraph [ref=f9e255]:
                      - text: The
                      - emphasis [ref=f9e256]: Summa Theologiae
                      - text: ", composed between 1265 and his death, organises Christian doctrine as a single deductive system in three Parts and over five hundred questions. Each question is debated in the disputational form of the schools — objections, a settled response ("
                      - emphasis [ref=f9e257]: respondeo
                      - text: ), and replies. The five proofs of God's existence (the Quinque Viae) of i.q.2.a.3 remain the most-discussed pages of medieval thought.
