                - paragraph [ref=f8e402]: "After the Titanomachy the world was divided by lot among the three sons of Cronus: Zeus took the bright sky, Poseidon the salt sea, and Hades the world below. The earth and Olympus they held in common. About them gathered the company of twelve who feast on ambrosia in the cloud-girt halls — the gods to whom temples were raised in every Greek city and whose images are most familiar to us. They are bright, jealous, and often petty; their virtues and faults belong unmistakably to the people who imagined them."
