                  - button "Zeus Ζεύς Jupiter Iuppiter Optimus Maximus King of the gods · god of the bright sky, thunder, hospitality, and oaths Youngest son of Cronus and Rhea, hidden at birth and reared in the Cretan cave of Mount Ida by the nymph Amalthea. Having freed his swallowed brethren, he led the Olympians to victory in the ten-year war against the Titans, after which he was acknowledged king by lot of the sky. His justice is the justice of the storm — sudden, irreversible, and often partial. Parents Cronus & Rhea Consort Hera; many besides Symbols thunderbolt · eagle · oak · aegis Sacred to Olympia · Dodona · Mount Ida" [ref=f8e404] [cursor=pointer]:
