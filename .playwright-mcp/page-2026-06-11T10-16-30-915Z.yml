                    - paragraph [ref=f9e576]: Trained for the priesthood and turned by his reading of Brentano and the Greeks toward philosophy, Heidegger became Husserl's assistant at Freiburg and his successor in the chair of phenomenology. He passed almost his entire teaching life in the Black Forest of his upbringing, where he kept a hut at Todtnauberg in which much of his later writing was composed.
                    - paragraph [ref=f9e577]:
                      - emphasis [ref=f9e578]: Sein und Zeit
                      - text: (1927) proposes to renew the question of the meaning of Being (
                      - emphasis [ref=f9e579]: Sein
                      - text: ) — a question, Heidegger argues, that has been forgotten since the Greeks. The route to it lies through an analytic of the kind of being that
                      - emphasis [ref=f9e580]: can
                      - text: "raise the question of being: human existence, named Dasein (“being-there”). The book's twin themes are being-in-the-world and being-toward-death."
