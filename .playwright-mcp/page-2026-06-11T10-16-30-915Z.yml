                  - generic [ref=f9e217]: Ataraxia
                  - generic [ref=f9e218]: ἀταραξία
                  - paragraph [ref=f9e219]: Tranquility of mind, the goal both of the Epicurean (through right desire) and the Pyrrhonist (through suspension of judgment).
            - generic [ref=f9e220]:
