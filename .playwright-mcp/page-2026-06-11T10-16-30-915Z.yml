              - paragraph [ref=f9e93]:
                - generic [ref=f9e94]: Argument of the Book
                - text: The era opens at Miletus, where Thales is said to have held that all things are water, and closes with Justinian's edict shuttering the Academy at Athens after nine centuries of operation. Between these two dates the Greeks invent, almost from nothing, the disciplines of metaphysics, ethics, politics, logic, natural philosophy, and aesthetics — and the Romans translate the inheritance into Latin, where it will wait out the long medieval custody of the Church.
