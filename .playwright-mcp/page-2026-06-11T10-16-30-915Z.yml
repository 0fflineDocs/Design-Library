                  - text: Medieval Philosophy
                - generic [ref=f9e225]: c. 400 — 1500 ce
              - paragraph [ref=f9e226]:
                - generic [ref=f9e227]: Argument of the Book
                - text: For a millennium, philosophy serves theology — first in the Latin West through Augustine's Christian Platonism, then through the Islamic recovery of Aristotle in tenth-century Baghdad, Cordoba and Cairo, and at last in the great thirteenth-century synthesis of Paris, where Aquinas reconciles the Stagirite with revelation. The age closes with the nominalist solvent of Ockham and the humanist return ad fontes.
