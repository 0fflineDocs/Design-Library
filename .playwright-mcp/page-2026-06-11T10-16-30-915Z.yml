                  - generic [ref=f9e197]: εἴδη · ideai
                  - paragraph [ref=f9e198]: Eternal, unchanging archetypes of which sensible particulars are imperfect copies; the proper objects of true knowledge.
                - generic [ref=f9e199]:
                  - generic [ref=f9e200]: Eudaimonia
                  - generic [ref=f9e201]: εὐδαιμονία
                  - paragraph [ref=f9e202]:
                    - text: Human flourishing — the active life lived in accordance with virtue, identified by Aristotle as the highest good (
