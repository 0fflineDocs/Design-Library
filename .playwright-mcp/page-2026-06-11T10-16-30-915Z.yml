                - heading "§ The Nineteenth Century" [level=2] [ref=f9e435]:
                  - generic [ref=f9e436]: §
                  - text: The Nineteenth Century
                - generic [ref=f9e437]: 1800 — 1900
              - paragraph [ref=f9e438]:
                - generic [ref=f9e439]: Argument of the Book
                - text: "The century begins with Hegel completing the Kantian project on the largest possible scale — Spirit unfolding itself dialectically through history — and ends with Nietzsche announcing the death of God and the exhaustion of every system the German universities had built. Between these poles: Marx inverts Hegel into materialism; Kierkegaard rejects the system for the existing individual; Schopenhauer relocates reality in blind Will; the utilitarians remake ethics on the basis of consequence."
