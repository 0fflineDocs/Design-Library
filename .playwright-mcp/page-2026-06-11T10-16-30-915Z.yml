                - article [ref=f9e151]:
                  - heading "Stoicism" [level=4] [ref=f9e152]
                  - generic [ref=f9e153]: 3rd c. bce — 3rd c. ce
                  - paragraph [ref=f9e154]:
                    - text: Founded by Zeno of Citium in the Stoa Poikilē at Athens. The Stoics held that virtue is the sole good, that the cosmos is governed by a rational
                    - emphasis [ref=f9e155]: logos
                    - text: with which the wise man aligns his will, and that destructive passions arise from false judgments about value.
                  - generic [ref=f9e156]: Figures Zeno · Cleanthes · Chrysippus · Seneca · Epictetus · Marcus Aurelius
                - article [ref=f9e157]:
                  - heading "Epicureanism" [level=4] [ref=f9e158]
                  - generic [ref=f9e159]: 307 bce — 4th c. ce
                  - paragraph [ref=f9e160]:
                    - text: Epicurus taught from a walled garden outside Athens that pleasure (
                    - emphasis [ref=f9e161]: hēdonē
                    - text: ) — properly understood as the absence of bodily pain (
                    - emphasis [ref=f9e162]: aponia
                    - text: ) and mental disturbance (
                    - emphasis [ref=f9e163]: ataraxia
                    - text: ) — is the end of life, and that the gods, though they exist, take no interest in human affairs.
                  - generic [ref=f9e164]: Figures Epicurus · Metrodorus · Philodemus · Lucretius
                - article [ref=f9e165]:
                  - heading "Aristotelianism & the Peripatos" [level=4] [ref=f9e166]
                  - generic [ref=f9e167]: 335 bce — 6th c. ce
                  - paragraph [ref=f9e168]:
                    - text: Aristotle's school at the Lyceum advanced a systematic philosophy uniting logic, biology, ethics, politics, and metaphysics. Where Plato sought reality in transcendent Forms, Aristotle located it in the immanent
                    - emphasis [ref=f9e169]: ousia
                    - text: of concrete substances — form and matter inseparable.
                  - generic [ref=f9e170]: Figures Aristotle · Theophrastus · Strato · Alexander of Aphrodisias
                - article [ref=f9e171]:
                  - heading "Pyrrhonian Skepticism" [level=4] [ref=f9e172]
                  - generic [ref=f9e173]: 3rd c. bce — 3rd c. ce
                  - paragraph [ref=f9e174]:
                    - text: Pyrrho of Elis returned from Alexander's Indian campaign teaching the suspension of judgment (
                    - emphasis [ref=f9e175]: epochē
                    - text: ) on all matters of speculative belief — for every argument an opposing argument of equal force can be produced, and from this equipollence follows tranquility (
                    - emphasis [ref=f9e176]: ataraxia
                    - text: ).
                  - generic [ref=f9e177]: Figures Pyrrho · Timon · Aenesidemus · Sextus Empiricus
                - article [ref=f9e178]:
                  - heading "Neoplatonism" [level=4] [ref=f9e179]
                  - generic [ref=f9e180]: 3rd c. — 6th c. ce
                  - paragraph [ref=f9e181]:
                    - text: Plotinus reconstructed Plato into a hierarchical metaphysics descending from the ineffable
                    - emphasis [ref=f9e182]: One
                    - text: ", through Intellect ("
                    - emphasis [ref=f9e183]: Nous
                    - text: ) and Soul, to the material world. The system would shape Christian, Jewish, and Islamic mysticism for a thousand years.
                  - generic [ref=f9e184]: Figures Plotinus · Porphyry · Iamblichus · Proclus
                - article [ref=f9e185]:
                  - heading "The Pre-Socratics" [level=4] [ref=f9e186]
                  - generic [ref=f9e187]: 6th — 5th c. bce
                  - paragraph [ref=f9e188]:
                    - text: The Milesians (Thales, Anaximander, Anaximenes) sought a single
                    - emphasis [ref=f9e189]: archē
                    - text: underlying nature; Heraclitus countered with universal flux and the
                    - emphasis [ref=f9e190]: logos
                    - text: ; Parmenides denied change altogether; Democritus reduced everything to atoms in the void.
                  - generic [ref=f9e191]: Figures Thales · Heraclitus · Parmenides · Empedocles · Anaxagoras · Democritus
