                  - generic [ref=f9e362]: Critical philosophy · Transcendental idealism · Initiator of German Idealism
                  - generic [ref=f9e363]:
                    - paragraph [ref=f9e364]: "Kant passed the whole of his life in the Prussian city of Königsberg, where his daily walk past the houses of his neighbours was said to be punctual enough for them to set their clocks by. The intellectual life, by contrast, was anything but settled: read by Hume in middle age, Kant claimed to have been awakened from his “dogmatic slumber” — the slumber, that is, of Wolffian rationalism."
                    - paragraph [ref=f9e365]:
                      - text: The
                      - emphasis [ref=f9e366]: Critique of Pure Reason
                      - text: "(1781, second edition 1787) executes a “Copernican revolution” in philosophy: knowledge does not conform to objects, but objects to the conditions of knowledge supplied by the mind. Space and time are the a priori forms of sensible intuition; the categories (substance, causation, &c.) are the forms of the understanding. We can know phenomena — appearances thus structured — but not noumena, things in themselves."
