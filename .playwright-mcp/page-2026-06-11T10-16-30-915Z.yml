                  - generic [ref=f9e430]: under the aspect of eternity
                  - paragraph [ref=f9e431]: "Spinoza's standpoint of philosophical contemplation: viewing things as the rational order of nature requires, not as the passions disclose them."
            - generic [ref=f9e432]:
