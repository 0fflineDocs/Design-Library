              - generic [ref=f9e272]:
                - article [ref=f9e273]:
                  - heading "Augustinianism" [level=4] [ref=f9e274]
                  - generic [ref=f9e275]: 5th — 13th c.
                  - paragraph [ref=f9e276]:
                    - text: Augustine of Hippo synthesized Pauline Christianity with Neoplatonism, producing a theology of grace, original sin, and the inwardness of the soul that would govern Western piety and self-examination from the
                    - emphasis [ref=f9e277]: Confessions
                    - text: onward.
                  - generic [ref=f9e278]: Figures Augustine · Boethius · Anselm · Bonaventure
                - article [ref=f9e279]:
                  - heading "Falsafa — Islamic Aristotelianism" [level=4] [ref=f9e280]
                  - generic [ref=f9e281]: 9th — 12th c.
                  - paragraph [ref=f9e282]: From Baghdad to Cordoba, philosophers in the Arabic tradition preserved, commented upon, and extended Aristotle and the Neoplatonists — the channel through which the corpus returned to Latin Europe in the twelfth century.
                  - generic [ref=f9e283]: Figures al-Kindī · al-Fārābī · Ibn Sīnā (Avicenna) · al-Ghazālī · Ibn Rushd (Averroes)
                - article [ref=f9e284]:
                  - heading "The High Scholastics" [level=4] [ref=f9e285]
                  - generic [ref=f9e286]: 13th c.
                  - paragraph [ref=f9e287]:
                    - text: At Paris and Oxford the universities institutionalised the disputational method — the
                    - emphasis [ref=f9e288]: quaestio
                    - text: ", the"
                    - emphasis [ref=f9e289]: lectio
                    - text: ", the commentary on the"
                    - emphasis [ref=f9e290]: Sentences
                    - text: of Peter Lombard — producing the most systematic philosophical writing of the Christian Middle Ages.
                  - generic [ref=f9e291]: Figures Albertus Magnus · Aquinas · Bonaventure · Duns Scotus · Roger Bacon
                - article [ref=f9e292]:
                  - heading "Nominalism" [level=4] [ref=f9e293]
                  - generic [ref=f9e294]: 14th c.
                  - paragraph [ref=f9e295]:
                    - text: William of Ockham denied that universals possess any reality outside the mind — they are mere names (
                    - emphasis [ref=f9e296]: nomina
                    - text: ") for collections of particulars. The methodological consequence is the celebrated razor: entities are not to be multiplied without necessity."
                  - generic [ref=f9e297]: Figures William of Ockham · Jean Buridan · Nicholas of Autrecourt
