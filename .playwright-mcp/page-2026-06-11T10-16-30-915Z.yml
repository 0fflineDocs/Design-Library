                - generic [ref=f9e548]: Argument of the Book
                - text: Philosophy in the twentieth century divides into two great rivers that for a long time would not acknowledge one another. On the continent, Husserl's phenomenology gives rise to Heidegger, Sartre, and Merleau-Ponty, then to structuralism and its successors. In the Anglosphere, Russell and Moore turn from idealism to analysis; the logical positivists attempt to put metaphysics out of business; Wittgenstein appears on both sides of the question, and changes his mind.
