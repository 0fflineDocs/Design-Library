                - generic [ref=f9e412]:
                  - generic [ref=f9e413]: Tabula Rasa
                  - generic [ref=f9e414]: blank slate
                  - paragraph [ref=f9e415]: Locke's image of the mind at birth — devoid of innate ideas, written upon by experience alone.
                - generic [ref=f9e416]:
                  - generic [ref=f9e417]: Monad
                  - generic [ref=f9e418]: monas · unity
                  - paragraph [ref=f9e419]: "Leibniz's elementary substance: simple, unextended, windowless, each mirroring the entire universe from its own point of view."
                - generic [ref=f9e420]:
                  - generic [ref=f9e421]: Categorical Imperative
                  - generic [ref=f9e422]: kategorischer Imperativ
                  - paragraph [ref=f9e423]: "Kant's supreme moral law: act only on that maxim by which you can at the same time will it to become a universal law."
                - generic [ref=f9e424]:
                  - generic [ref=f9e425]: A Priori / A Posteriori
                  - generic [ref=f9e426]: before · after experience
                  - paragraph [ref=f9e427]: The distinction between what may be known independently of experience and what depends upon it — fundamental to all post-Kantian epistemology.
                - generic [ref=f9e428]:
