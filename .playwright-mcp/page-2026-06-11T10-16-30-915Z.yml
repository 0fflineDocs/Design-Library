                - generic [ref=f8e55]: The Greek Pantheon — Gods, Concepts & Creatures
                - generic [ref=f8e57]: Compendious Reference· Sixty-Two Entries· Five Tiers of Divinity
              - generic [ref=f8e58]:
                - paragraph [ref=f8e59]: "The Greeks did not invent a religion so much as inherit a quarrel — between an older order of cosmic powers and a younger family of bright, willful gods who deposed them. What follows is a compendium of that quarrel and of its long aftermath: the lineages, the offices, and the strange middle-creatures bred at its margins. Each entry collects the figure's domain, customary symbols, mythic kinships, and a brief description suitable for ready consultation."
                - paragraph [ref=f8e60]: The arrangement proceeds by age and stature, from the first Primordials born of Chaos, through the deposed Titans, to the twelve Olympians enthroned upon Mount Olympus, and at last to the lesser personifications and creatures of the bestiary. The reader is invited to wander as the eye is led.
