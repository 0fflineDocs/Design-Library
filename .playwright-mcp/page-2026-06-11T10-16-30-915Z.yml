                  - generic [ref=f9e120]:
                    - paragraph [ref=f9e121]: Born into the Athenian aristocracy in the generation following the Periclean age, Plato turned from a political career to the philosophical life under the influence of Socrates, whose trial and execution in 399 bce furnished the perpetual subject of his early dialogues. He founded the Academy outside Athens around 387 bce — the first sustained institution of higher learning in the Western world, where it would operate, with interruptions, until 529 ce.
                    - paragraph [ref=f9e122]:
                      - text: The mature metaphysics holds that the visible world is a deficient copy of an intelligible realm of Forms (εἴδη) — eternal, unchanging archetypes of which particular things are imperfect instances. The
                      - emphasis [ref=f9e123]: Republic
                      - text: uses this doctrine to construct a tripartite soul (reason, spirit, appetite) and a just city ruled by philosopher-kings; the late dialogues —
                      - emphasis [ref=f9e124]: Parmenides
                      - text: ","
                      - emphasis [ref=f9e125]: Sophist
                      - text: ","
                      - emphasis [ref=f9e126]: Theaetetus
                      - text: ","
                      - emphasis [ref=f9e127]: Timaeus
                      - text: — interrogate the Forms doctrine and pursue questions of being, knowledge, and cosmology with progressively more austere argument.
