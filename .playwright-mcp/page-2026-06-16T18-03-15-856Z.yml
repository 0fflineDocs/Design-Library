    - generic [ref=e13]:
      - generic [ref=e14]: Design Reference
      - generic [ref=e15]: Nyx
      - generic [ref=e16]: Void and static. Terminal-first AI workspace. JetBrains Mono meets Instrument Serif.
      - paragraph [ref=e18]:
        - strong [ref=e19]: Void and static. Terminal-first.
        - text: "Nyx is a monospace-dominant AI workspace — the interface dissolves into conversation, leaving only text and signal. JetBrains Mono carries everything from body copy to labels; Instrument Serif surfaces only in headlines, as a reminder that thought precedes the machine. Colour is almost entirely withheld: three accents mark the moments that warrant attention — violet for interaction, acid green for measure, rose for the AI's own voice."
    - generic [ref=e20]:
