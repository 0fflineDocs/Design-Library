        - generic [ref=e132]: Typography
        - paragraph [ref=e134]: "JetBrains Mono is the body font — a deliberate inversion of convention. The interface is a terminal; the monospace grid is the grid. Every label, every sentence, every data value inherits the same optical rhythm. Space Grotesk handles higher-level UI chrome — geometric, traceable to Futura, never decorative. Instrument Serif appears only at display scale: nameplates and section headings where human authorship should be legible in the type."
