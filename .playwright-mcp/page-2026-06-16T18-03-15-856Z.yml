        - generic [ref=e23]: Color palette
        - paragraph [ref=e25]:
          - text: The background hierarchy descends through absolute black.
          - code [ref=e26]: "--color-void"
          - text: (#000000) is the page frame;
          - code [ref=e27]: "--color-surface"
          - text: (#0a0a0a) is the application ground;
          - code [ref=e28]: "--color-bubble"
          - text: (#27272a) is the raised surface for message bubbles and panels.
          - code [ref=e29]: "--color-border"
          - text: (#3f3f46) draws faint zinc lines that divide without decorating. These are not design choices in the aesthetic sense — they are the load-bearing walls of a system that treats darkness as content.
