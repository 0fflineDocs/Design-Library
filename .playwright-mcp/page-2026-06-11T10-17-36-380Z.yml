          - text: (raised surfaces). This cool slate replaces the original blue-black navy with a more neutral professional tone.
          - code [ref=e330]: "--signal"
          - text: (#34E2A0) is the brand accent and literal meaning of a passing verdict — softer than the original
          - code [ref=e331]: "#39ff9e"
