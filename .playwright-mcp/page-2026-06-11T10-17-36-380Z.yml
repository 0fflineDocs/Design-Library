    - generic [ref=e313]:
      - generic [ref=e314]: Design Reference
      - generic [ref=e315]: Verdict
      - generic [ref=e316]: Dark slate "ink" base. Emerald signal. IBM Plex Sans meets IBM Plex Mono.
      - paragraph [ref=e318]:
        - strong [ref=e319]: Cool slate "ink." Emerald signal. IBM Plex Mono is the soul.
        - text: "Verdict is a CLI-only tool for assessing Microsoft Intune security baselines — pulling upstream references, reconciling against deployed tenant policy, and rendering a readable verdict: aligned, drifted, or missing. The design system is a deliberate professional evolution of the original CRT/phosphor reports: the dark terminal heritage and phosphor-green meaning of \"pass\" are preserved, but the palette is cooled and calmed into a security-operations product aesthetic."
